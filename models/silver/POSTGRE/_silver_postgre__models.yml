version: 2

models:
  - name: stg_POSTGRE_DB__PRODUCTS
    config:
      contract:
        enforced: true
    description: "Data about all products in demo."
    columns:
      - name: product_id
        data_tests:
          - not_null
        data_type: text
        constraints:
          - type: not_null
        description: >
          UUID for each unique product on platform.
      - name: name
        data_type: TEXT                      
        constraints:
          - type: not_null
        description: >
          Name of the product.
      - name: price
        data_type: real
        constraints:
          - type: not_null
        description: >
          Price of the product.
      - name: inventory
        data_type: NUMBER                      
        constraints:
          - type: not_null
        description: >
          Amount of the inventory we have for this product.
      - name: date_load
        data_type: TIMESTAMP_TZ
        constraints:
          - type: not_null   
        description: >
          Date that the data was loaded.
      - name: date_deleted
        data_type: TIMESTAMP_TZ  
        description: >
          Date that the data was deleted.
  
  - name: stg_POSTGRE_DB__ADDRESSES
    config:
      contract:
        enforced: true
    description: "Data about all addresses in demo."
    columns:
      - name: address_id
        data_tests:
            - not_null
        data_type: text
        constraints:
          - type: not_null
        description: >
          UUID for each unique address on platform.
      - name: address
        data_type: varchar
        description: ""
        
      - name: state
        data_type: varchar
        description: ""

      - name: zipcode
        data_type: varchar
        description: ""

      - name: country
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: varchar
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: stg_POSTGRE_DB__ORDER_ITEMS
    config:
      contract:
        enforced: false
    description: "Data about all order items in demo."
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: product_id
        data_type: varchar
        description: ""

      - name: quantity
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: varchar
        description: ""

      - name: _fivetran_synced
        data_type: varchar
        description: ""


  - name: stg_POSTGRE_DB__ORDERS
    config:
      contract:
        enforced: false
    description: "Data about all orders in demo."
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: shipping_service
        data_type: varchar
        description: ""

      - name: shipping_cost
        data_type: varchar
        description: ""

      - name: address_id
        data_type: varchar
        description: ""

      - name: created_at
        data_type: varchar
        description: ""

      - name: promo_id
        data_type: varchar
        description: ""

      - name: estimated_delivery_at
        data_type: varchar
        description: ""

      - name: order_cost
        data_type: varchar
        description: ""

      - name: user_id
        data_type: varchar
        description: ""

      - name: order_total
        data_type: varchar
        description: ""

      - name: delivered_at
        data_type: varchar
        description: ""

      - name: tracking_id
        data_type: varchar
        description: ""

      - name: status
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: varchar
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: stg_POSTGRE_DB__PROMOS
    config:
      contract:
        enforced: false
    description: "Data about all promos in demo."
    columns:
      - name: promo_id
        data_type: varchar
        description: ""

